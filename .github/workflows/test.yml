name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  familia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install nanobot + familia (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ./nanobot -e ./familia pytest pytest-asyncio ruff
      - name: Ruff (familia)
        run: ruff check familia/src
      - name: Pytest (familia)
        run: pytest familia/tests -q
